<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy Pro</title>

<style>
body {
    margin:0;
    font-family:Poppins;
    background:#0f0f0f;
    color:#fff;
}

header {
    background:linear-gradient(90deg,#ff512f,#dd2476);
    padding:15px;
    text-align:center;
    font-size:22px;
}

section { padding:20px; }

.card {
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    margin:10px 0;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button {
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#25D366;
    color:#fff;
    font-size:16px;
}

.preview img {
    max-width:100%;
    margin-top:10px;
    border-radius:10px;
}

.admin {
    background:#111;
}

.order-box {
    background:#222;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}
</style>

</head>

<body>

<header>VFrameGalleryy 🚀 Version 6</header>

<section>

<h2>Place Order</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<select id="size">
<option>Choose Size</option>
<option>6x4 - ₹100</option>
<option>8x12 - ₹250</option>
<option>12x18 - ₹350</option>
</select>

<label>Upload Photo 📎</label>
<input type="file" id="photo">

<div class="preview">
<img id="photoPreview">
</div>

<label>Payment Screenshot 💳</label>
<input type="file" id="payment">

<div class="preview">
<img id="paymentPreview">
</div>

<button onclick="submitOrder()">Submit Order</button>

</section>

<section class="admin">

<h2>Admin Panel 📊</h2>

<button onclick="loadOrders()">Load Orders</button>
<button onclick="downloadOrders()">Download Orders</button>

<div id="orders"></div>

</section>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

document.getElementById("photo").onchange = e => {
    let file = e.target.files[0];
    document.getElementById("photoPreview").src = URL.createObjectURL(file);
};

document.getElementById("payment").onchange = e => {
    let file = e.target.files[0];
    document.getElementById("paymentPreview").src = URL.createObjectURL(file);
};

function submitOrder() {
    let order = {
        name: name.value,
        phone: phone.value,
        address: address.value,
        size: size.value,
        date: new Date().toLocaleString()
    };

    orders.push(order);
    localStorage.setItem("orders", JSON.stringify(orders));

    sendWhatsApp(order);

    alert("Order Saved ✅");
}

function sendWhatsApp(order) {
    let msg = `🔥 VFrameGalleryy Order 🔥%0A
Name: ${order.name}%0A
Phone: ${order.phone}%0A
Address: ${order.address}%0A
Size: ${order.size}`;

    let num = "9494899320"; // change number

    window.open(`https://wa.me/${num}?text=${msg}`);
}

function loadOrders() {
    let container = document.getElementById("orders");
    container.innerHTML = "";

    orders.forEach((o, i) => {
        container.innerHTML += `
        <div class="order-box">
        <b>${o.name}</b><br>
        ${o.phone}<br>
        ${o.size}<br>
        ${o.date}<br>
        <button onclick="deleteOrder(${i})">Delete</button>
        </div>`;
    });
}

function deleteOrder(i) {
    orders.splice(i,1);
    localStorage.setItem("orders", JSON.stringify(orders));
    loadOrders();
}

function downloadOrders() {
    let data = JSON.stringify(orders, null, 2);
    let blob = new Blob([data], {type:"application/json"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "orders.json";
    a.click();
}

</script>

</body>
</html>
