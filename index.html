<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
header {background:#111;color:white;text-align:center;padding:15px;}
.hero {background:#222;color:white;text-align:center;padding:30px;}
.container {padding:20px;}

.card {
    background:white;
    margin:15px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.price {color:green;font-weight:bold;font-size:18px;}

.btn {
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#25D366;
    color:white;
    border-radius:5px;
    text-decoration:none;
}

.frame-img {
    width:100%;

    border-radius:10px;
    margin-bottom:10px;
}

/* Delivery Banner */
.delivery {
    background:#ff9800;
    color:white;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

/* Floating WhatsApp */
.float {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    font-size:20px;
}

footer {background:#000;color:white;text-align:center;padding:15px;}
</style>
</head>
