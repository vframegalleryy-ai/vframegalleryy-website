<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<style>
body {
    margin:0;
    font-family:Poppins;
    background:#0f0f0f;
    color:#fff;
}

header {
    background:linear-gradient(90deg,#ff512f,#dd2476);
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.hero {
    text-align:center;
    padding:30px;
}

.badge {
    background:#25D366;
    display:inline-block;
    padding:8px 15px;
    border-radius:20px;
    margin-top:10px;
}

.prices {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:#1c1c1c;
    margin:10px;
    padding:20px;
    border-radius:15px;
    width:250px;
    text-align:center;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.order {
    padding:20px;
    background:#1a1a1a;
}

input, select, textarea {
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.whatsapp {
    background:#25D366;
    color:#fff;
}

.instagram {
    background:#E1306C;
    color:#fff;
    margin-top:10px;
}

.preview img {
    max-width:100%;
    border-radius:10px;
    margin-top:10px;
}

footer {
    text-align:center;
    padding:20px;
    background:#000;
}
</style>

</head>

<body>

<header>VFrameGalleryy 🚀</header>

<section class="hero">
<h1>Premium Photo Frames</h1>
<p>Make Your Memories Beautiful ❤️</p>
<div class="badge">🎉 200+ Happy Customers</div>
</section>

<section class="prices">

<div class="card">
<h2>6 x 4 Frame</h2>
<p>₹100</p>
</div>

<div class="card">
<h2>8 x 12 Frame</h2>
<p>₹250</p>
</div>

<div class="card">
<h2>12 x 18 Frame</h2>
<p>₹350</p>
</div>

</section>

<section class="order">

<h2>Place Your Order</h2>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Address"></textarea>

<select id="size">
<option>Select Frame Size</option>
<option>6x4 - ₹100</option>
<option>8x12 - ₹250</option>
<option>12x18 - ₹350</option>
</select>

<label>Upload Photo 📎</label>
<input type="file" id="photo">

<div class="preview">
<img id="previewImg">
</div>

<button class="whatsapp" onclick="sendWhatsApp()">Order on WhatsApp</button>

<button class="instagram" onclick="openInstagram()">Follow on Instagram</button>

</section>

<footer>
© 2026 VFrameGalleryy | All Andhra Pradesh Delivery 🚚
</footer>

<script>

// Image Preview
document.getElementById("photo").onchange = function(e){
    let file = e.target.files[0];
    document.getElementById("previewImg").src = URL.createObjectURL(file);
};

// WhatsApp Order
function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let size = document.getElementById("size").value;

    let msg = `🔥 New Order - VFrameGalleryy 🔥%0A
Name: ${name}%0A
Phone: ${phone}%0A
Address: ${address}%0A
Frame: ${size}`;

    let url = `https://wa.me/919494899320?text=${msg}`;

    window.open(url, '_blank');
}

// Instagram
function openInstagram(){
    window.open("https://instagram.com/vframegalleryy", "_blank");
}

</script>

</body>
</html>
