<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0f0f0f;
  color:#fff;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#000,#1a1a1a);
}

.hero h1{
  font-size:40px;
  margin-bottom:10px;
}

.hero p{
  opacity:0.7;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#ffcc00;
  color:#000;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

/* CARDS */
.cards{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
  width:250px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  border-radius:10px;
}

.price{
  color:#ffcc00;
  font-size:22px;
  margin:10px 0;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.1);
}

/* TRUST */
.trust{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

.trust div{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
}

/* WHATSAPP BUTTON */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* STICKY CTA */
.sticky{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ffcc00;
  color:#000;
  text-align:center;
  padding:10px;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Turn Your Memories Into Frames ❤️</h1>
  <p>Premium Photo Frames at Best Price</p>
  <button class="btn" onclick="scrollToSection()">View Frames</button>
</section>

<!-- PRICING -->
<section class="section" id="frames">
  <h2>Our Frames</h2>

  <div class="cards">

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>6x4 Frame</h3>
      <p class="price">₹99</p>
      <button class="btn" onclick="order()">Order Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>8x12 Frame</h3>
      <p class="price">₹249</p>
      <button class="btn" onclick="order()">Order Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <h3>12x18 Frame</h3>
      <p class="price">₹349</p>
      <button class="btn" onclick="order()">Order Now</button>
    </div>

  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
  </div>
</section>

<!-- TRUST -->
<section class="section">
  <h2>Why Choose Us</h2>
  <div class="trust">
    <div>🚚 All Over Andhra Pradesh Delivery</div>
    <div>⭐ 100+ Happy Customers</div>
    <div>📦 Safe Packaging</div>
  </div>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/9494899320">💬</a>

<!-- STICKY -->
<div class="sticky">
  Order Now on WhatsApp 🔥
</div>

<script>
function scrollToSection(){
  document.getElementById("frames").scrollIntoView({behavior:"smooth"});
}

function order(){
  window.open("https://wa.me/91XXXXXXXXXX?text=I want to order a frame");
}
</script>

</body>
</html>
