<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f0f0f;
  color:white;
}
header {
  text-align:center;
  padding:20px;
  background:black;
  font-size:24px;
  font-weight:bold;
}
.hero {
  text-align:center;
  padding:20px;
}
.frames {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:20px;
}
.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
}
.price { color:#00ffcc; }

.form-box {
  max-width:400px;
  margin:auto;
  padding:20px;
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

.total-box {
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
}

.btn {
  display:block;
  text-align:center;
  padding:15px;
  border-radius:10px;
  background:#25D366;
  color:black;
  font-weight:bold;
  margin-top:10px;
}

.note {
  text-align:center;
  color:#00ffcc;
  font-size:14px;
}

footer {
  text-align:center;
  padding:20px;
  background:black;
}
</style>
</head>

<body>

<header>VFrameGalleryy</header>

<div class="hero">
  <h2>🚚 Delivery Available Only in Andhra Pradesh</h2>
</div>

<!-- FRAMES -->
<div class="frames">
  <div class="card"><h3>6x4</h3><p class="price">₹99</p></div>
  <div class="card"><h3>8x12</h3><p class="price">₹249</p></div>
  <div class="card"><h3>12x18</h3><p class="price">₹349</p></div>
</div>

<!-- FORM -->
<div class="form-box">
  <h2>Order Details</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="tel" id="phone" placeholder="Mobile Number">

  <select id="size" onchange="calculateTotal()">
    <option value="">Select Frame Size</option>
    <option value="99">6x4 - ₹99</option>
    <option value="249">8x12 - ₹249</option>
    <option value="349">12x18 - ₹349</option>
  </select>

  <textarea id="address" placeholder="Full Address (Andhra Pradesh Only)"></textarea>

  <!-- TOTAL -->
  <div class="total-box">
    <p>Frame Price: ₹<span id="framePrice">0</span></p>
    <p>Delivery Charge (AP): ₹60</p>
    <h3>Total: ₹<span id="total">0</span></h3>
  </div>

  <p class="note">💰 Pay after confirmation on WhatsApp</p>

  <a class="btn" onclick="sendWhatsApp()">Order on WhatsApp</a>
</div>

<footer>© 2026 VFrameGalleryy</footer>

<script>
function calculateTotal(){
  let frame = document.getElementById("size").value || 0;
  let delivery = 50;

  let total = parseInt(frame) + delivery;

  document.getElementById("framePrice").innerText = frame;
  document.getElementById("total").innerText = total;
}

function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let size = document.getElementById("size").options[document.getElementById("size").selectedIndex].text;
  let address = document.getElementById("address").value;
  let total = document.getElementById("total").innerText;

  let msg = `*New Order - VFrameGalleryy*%0A
Name: ${name}%0A
Phone: ${phone}%0A
Frame: ${size}%0A
Delivery: Andhra Pradesh Only (₹50)%0A
Address: ${address}%0A
Total Amount: ₹${total}`;

  window.open(`https://wa.me/919494899320?text=${msg}`, '_blank');
}
</script>

</body>
</html>
