<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<style>
body {
  margin:0;
  font-family: 'Poppins', sans-serif;
  background:#0f0f0f;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  background:black;
  font-size:24px;
  font-weight:bold;
}

.hero {
  text-align:center;
  padding:30px;
}

.frames {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  padding:20px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  border-radius:15px;
  width:200px;
  text-align:center;
}

.price {
  color:#00ffcc;
}

/* FORM */
.form-box {
  max-width:400px;
  margin:auto;
  padding:20px;
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

/* BUTTON */
.btn {
  display:block;
  text-align:center;
  padding:15px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  background:#25D366;
  color:black;
  margin-top:10px;
}

.instagram {
  background:#E1306C;
  color:white;
}

.timer {
  text-align:center;
  color:#ff4444;
}

footer {
  text-align:center;
  padding:20px;
  background:black;
}
</style>
</head>

<body>

<header>VFrameGalleryy</header>

<div class="hero">
  <h1>Turn Your Memories Into Frames ❤️</h1>
  <p>200+ Happy Customers | All Over Andhra Pradesh Delivery 🚚</p>
</div>

<div class="timer">
  Offer Ends In: <span id="countdown"></span>
</div>

<!-- FRAMES -->
<div class="frames">
  <div class="card">
    <h3>6 x 4</h3>
    <p class="price">₹99</p>
  </div>
  <div class="card">
    <h3>8 x 12</h3>
    <p class="price">₹249</p>
  </div>
  <div class="card">
    <h3>12 x 18</h3>
    <p class="price">₹349</p>
  </div>
</div>

<!-- ORDER FORM -->
<div class="form-box">
  <h2>Enter Your Details</h2>

  <input type="text" id="name" placeholder="Full Name">
  <input type="tel" id="phone" placeholder="Mobile Number">

  <select id="size">
    <option>Select Frame Size</option>
    <option>6 x 4 - ₹99</option>
    <option>8 x 12 - ₹249</option>
    <option>12 x 18 - ₹349</option>
  </select>

  <textarea id="address" placeholder="Delivery Address"></textarea>
  <textarea id="note" placeholder="Any special request"></textarea>

  <a class="btn" onclick="sendWhatsApp()">Order on WhatsApp</a>

  <a class="btn instagram" href="https://instagram.com/vframegalleryy">Follow Instagram</a>
</div>

<footer>
  © 2026 VFrameGalleryy
</footer>

<script>
// WHATSAPP AUTO MESSAGE
function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let size = document.getElementById("size").value;
  let address = document.getElementById("address").value;
  let note = document.getElementById("note").value;

  let message = `*New Order - VFrameGalleryy*%0A
Name: ${name}%0A
Phone: ${phone}%0A
Frame Size: ${size}%0A
Address: ${address}%0A
Note: ${note}`;

  window.open(`https://wa.me/919494899320?text=${message}`, '_blank');
}

// TIMER
let endDate = new Date();
endDate.setHours(endDate.getHours()+5);

setInterval(function(){
  let now = new Date();
  let diff = endDate - now;

  let h = Math.floor(diff/1000/60/60);
  let m = Math.floor(diff/1000/60)%60;
  let s = Math.floor(diff/1000)%60;

  document.getElementById("countdown").innerHTML =
    h + "h " + m + "m " + s + "s";
},1000);
</script>

</body>
</html>
