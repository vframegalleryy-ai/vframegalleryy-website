<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
}

.logo {
    font-weight: 700;
    font-size: 20px;
    color: #00ffd5;
}

.nav-links a {
    margin-left: 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #00ffd5;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 40px;
    color: #00ffd5;
}

.hero p {
    margin-top: 10px;
    color: #ccc;
}

/* PRICE SECTION */
.prices {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 40px 20px;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.card h2 {
    color: #00ffd5;
    margin-bottom: 10px;
}

/* BUTTONS */
.buttons {
    text-align: center;
    margin: 30px 0;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.instagram {
    background: #E1306C;
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
    font-size: 14px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">VFrameGalleryy</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Prices</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Premium Photo Frames</h1>
    <p>Best Price • Best Quality • Fast Delivery</p>
</div>

<!-- PRICES -->
<div class="prices">
    <div class="card">
        <h2>6 × 4</h2>
        <p>₹99/-</p>
    </div>

    <div class="card">
        <h2>8 × 12</h2>
        <p>₹249/-</p>
    </div>

    <div class="card">
        <h2>12 × 18</h2>
        <p>₹349/-</p>
    </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
    <a href="https://wa.me/919494899320" class="btn whatsapp">Order on WhatsApp</a>
    <a href="https://instagram.com/vframegalleryy" class="btn instagram">Visit Instagram</a>
</div>

<!-- FOOTER -->
<div class="footer">
    Bulk orders available • Contact anytime
</div>

</body>
</html>
