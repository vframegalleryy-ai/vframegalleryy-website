<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VFrameGalleryy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f0f0f;color:#fff;}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.hero h1{
  font-size:40px;
  background:linear-gradient(90deg,#ffcc00,#ff6600);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTON */
.btn{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(90deg,#ffcc00,#ff6600);
  color:#000;
  cursor:pointer;
  font-weight:bold;
}

/* SECTION */
.section{padding:50px 20px;text-align:center;}

/* CARD */
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.card{
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
  width:250px;
}

/* FORM */
.form{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:none;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.gallery img{
  width:100%;
  border-radius:10px;
}

/* REELS */
.reels{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:80px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:#fff;
  text-decoration:none;
}

/* STICKY */
.sticky{
  position:fixed;
  bottom:0;
  width:100%;
  background:#ffcc00;
  color:#000;
  text-align:center;
  padding:10px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Frame Your Memories ❤️</h1>
  <p>Premium Frames | Fast Delivery</p>
  <button class="btn" onclick="scrollToOrder()">Order Now</button>
</section>

<!-- FRAMES -->
<section class="section">
  <h2>Our Frames</h2>
  <div class="cards">
    <div class="card">6x4 Frame - ₹99</div>
    <div class="card">8x12 Frame - ₹249</div>
    <div class="card">12x18 Frame - ₹349</div>
  </div>
</section>

<!-- ORDER FORM -->
<section class="section" id="order">
  <h2>Place Your Order</h2>

  <div class="form">
    <input type="text" id="name" placeholder="Your Name">
    <input type="tel" id="phone" placeholder="Phone Number">
    <input type="text" id="address" placeholder="Delivery Address">

    <select id="size" onchange="updatePrice()">
      <option value="">Select Frame Size</option>
      <option value="6x4">6x4 - ₹99</option>
      <option value="8x12">8x12 - ₹249</option>
      <option value="12x18">12x18 - ₹349</option>
    </select>

    <input type="text" id="coupon" placeholder="Coupon Code">

    <h3 id="price">Price: ₹0</h3>

    <button class="btn" onclick="applyCoupon()">Apply Coupon</button>
    <button class="btn" onclick="payUPI()">Pay via UPI</button>
    <button class="btn" onclick="sendWhatsApp()">Confirm Order</button>
  </div>
</section>

<!-- REELS -->
<section class="section">
  <h2>Instagram Reels 🔥</h2>
  <div class="reels">
    <iframe src="" width="150" height="250"></iframe>
    <iframe src="" width="150" height="250"></iframe>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
  </div>
</section>

<!-- TRUST -->
<section class="section">
  <h2>Why Choose Us</h2>
  <div class="cards">
    <div class="card">🚚 All Over Andhra Pradesh Delivery</div>
    <div class="card">⭐ 100+ Happy Customers</div>
    <div class="card">📦 Safe Packaging</div>
  </div>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/9494899320">💬</a>

<!-- STICKY -->
<div class="sticky">Order Now 🔥</div>

<script>

let basePrice = 0;

function scrollToOrder(){
  document.getElementById("order").scrollIntoView({behavior:"smooth"});
}

function updatePrice(){
  let size = document.getElementById("size").value;

  if(size==="6x4") basePrice = 99;
  if(size==="8x12") basePrice = 249;
  if(size==="12x18") basePrice = 349;

  document.getElementById("price").innerText = "Price: ₹" + basePrice;
}

function applyCoupon(){
  let code = document.getElementById("coupon").value;

  if(code === "VFRAME10"){
    basePrice = basePrice - 10;
    alert("Coupon Applied!");
  }

  document.getElementById("price").innerText = "Price: ₹" + basePrice;
}

function payUPI(){
  window.location.href = "upi://pay?pa=9494899320@ybl&pn=VFrameGalleryy&am="+basePrice;
}

function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;
  let size = document.getElementById("size").value;

  let message = `Order Details:%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0ASize: ${size}%0APrice: ₹${basePrice}`;

  window.open(`https://wa.me/91XXXXXXXXXX?text=${message}`);
}

</script>

</body>
</html>
